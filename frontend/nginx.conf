server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tamaño máximo de subida (por si en el futuro se suben archivos).
    client_max_body_size 20m;

    # Aplicación Angular (SPA): cualquier ruta desconocida devuelve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de la API hacia el backend Spring Boot (nombre del servicio en Docker).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tiempos de espera holgados para operaciones normales.
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check del backend (útil para soporte/monitoreo).
    location /actuator/health {
        proxy_pass http://backend:8080/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
