<div class="flex w-full flex-col">
  <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
    <div class="flex items-center gap-3">
      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-emerald-100 text-emerald-600">
        <span class="material-icons !text-[22px]">lock_open</span>
      </div>
      <h2 class="text-base font-semibold text-slate-800">Abrir caja</h2>
    </div>
    <button type="button" (click)="cancel()" class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600" aria-label="Cerrar">
      <span class="material-icons">close</span>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col">
    <div class="space-y-4 px-6 py-5">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-slate-700">Monto inicial (Q) *</label>
        <input
          type="number"
          step="0.01"
          min="0"
          formControlName="openingAmount"
          class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
          [class.border-red-400]="form.controls.openingAmount.touched && form.controls.openingAmount.invalid"
        />
        @if (form.controls.openingAmount.touched && form.controls.openingAmount.hasError('required')) {
          <p class="mt-1 text-xs text-red-600">El monto inicial es obligatorio</p>
        } @else if (form.controls.openingAmount.touched && form.controls.openingAmount.hasError('min')) {
          <p class="mt-1 text-xs text-red-600">No puede ser negativo</p>
        }
      </div>

      <div>
        <label class="mb-1.5 block text-sm font-medium text-slate-700">Notas</label>
        <textarea
          formControlName="notes"
          rows="2"
          placeholder="Ej: Apertura de caja turno mañana"
          class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
        ></textarea>
      </div>
    </div>

    <div class="flex justify-end gap-3 border-t border-slate-200 px-6 py-4">
      <button type="button" (click)="cancel()" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100">
        Cancelar
      </button>
      <button
        type="submit"
        [disabled]="saving()"
        class="flex items-center justify-center gap-2 rounded-xl bg-emerald-600 px-5 py-2 text-sm font-medium text-white transition hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-70"
      >
        @if (saving()) {
          <span class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
          <span>Abriendo...</span>
        } @else {
          <span>Abrir caja</span>
        }
      </button>
    </div>
  </form>
</div>
