<section>
  <!-- Encabezado / bienvenida -->
  <div class="mb-6 overflow-hidden rounded-2xl border border-slate-200 bg-gradient-to-br from-blue-600 to-blue-700 p-6 text-white shadow-sm">
    <div class="flex items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold">
          Hola{{ firstName() ? ', ' + firstName() : '' }} 👋
        </h1>
        <p class="mt-1 text-sm text-blue-100">Este es el panel principal del sistema.</p>
      </div>
      @if (role()) {
        <span class="hidden rounded-full bg-white/15 px-3 py-1 text-xs font-medium backdrop-blur sm:inline-block">
          {{ role() }}
        </span>
      }
    </div>
  </div>

  <!-- Tarjetas de acceso rápido -->
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
    @for (card of cards; track card.title) {
      <a
        [routerLink]="card.route"
        class="group flex flex-col rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition-all hover:-translate-y-0.5 hover:border-blue-200 hover:shadow-md"
      >
        <div class="mb-4 flex items-center justify-between">
          <div class="flex h-12 w-12 items-center justify-center rounded-xl" [class]="card.accent">
            <span class="material-icons !text-[24px]">{{ card.icon }}</span>
          </div>
          <span class="material-icons !text-[22px] text-slate-300 transition-colors group-hover:text-blue-500">
            arrow_forward
          </span>
        </div>
        <h3 class="text-base font-semibold text-slate-800">{{ card.title }}</h3>
        <p class="mt-1 text-sm text-slate-500">{{ card.description }}</p>
      </a>
    }
  </div>
</section>
