<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-slate-100 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950">
  <!-- Overlay móvil -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-20 bg-slate-900/40 lg:hidden" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-30 w-64 transform border-r border-slate-200 bg-white transition-transform duration-200 lg:translate-x-0"
    [class.translate-x-0]="sidebarOpen()"
    [class.-translate-x-full]="!sidebarOpen()"
  >
    <div class="flex h-16 items-center gap-3 border-b border-slate-200 px-5">
      <img
        src="logo.png"
        alt="Variedades Hernández"
        class="h-10 w-10 rounded-full object-cover ring-1 ring-slate-200 dark:ring-slate-700"
      />
      <span class="text-sm font-semibold leading-tight text-slate-800">
        Variedades<br />Hernández
      </span>
    </div>

    <nav class="flex flex-col gap-1 p-3">
      @for (item of navItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="!bg-blue-50 !text-blue-700 font-medium"
          class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm text-slate-600 transition-colors hover:bg-slate-100"
          (click)="closeSidebar()"
        >
          <span class="material-icons !text-[20px]">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </aside>

  <!-- Contenido -->
  <div class="lg:pl-64">
    <!-- Topbar -->
    <header class="sticky top-0 z-10 flex h-16 items-center justify-between border-b border-slate-200 bg-white/80 px-4 backdrop-blur sm:px-6">
      <button
        type="button"
        class="rounded-lg p-2 text-slate-500 transition hover:bg-slate-100 lg:hidden"
        (click)="toggleSidebar()"
        aria-label="Abrir menú"
      >
        <span class="material-icons">menu</span>
      </button>

      <div class="ml-auto flex items-center gap-3">
        <app-theme-toggle />
        <div class="text-right leading-tight">
          <p class="text-sm font-medium text-slate-800">{{ fullName() }}</p>
          <p class="text-xs text-slate-500">{{ user()?.role }}</p>
        </div>
        <div class="flex h-9 w-9 items-center justify-center rounded-full bg-blue-100 text-sm font-semibold text-blue-700">
          {{ initials() }}
        </div>
        <button
          type="button"
          class="flex items-center gap-1.5 rounded-xl px-3 py-2 text-sm text-slate-600 transition hover:bg-slate-100"
          (click)="logout()"
        >
          <span class="material-icons !text-[20px]">logout</span>
          <span class="hidden sm:inline">Salir</span>
        </button>
      </div>
    </header>

    <main class="p-4 sm:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
